<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瞰天科技 - 网站精选</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            background: rgba(255,255,255,0.95);
            padding: 60px;
            border-radius: 24px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.4);
            max-width: 900px;
        }
        h1 { font-size: 42px; color: #1a1a2e; margin-bottom: 10px; }
        h2 { font-size: 20px; color: #666; margin-bottom: 50px; font-weight: 400; }
        .styles {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .style-card {
            flex: 1;
            min-width: 200px;
            max-width: 260px;
            padding: 40px 30px;
            border-radius: 16px;
            text-decoration: none;
            transition: transform 0.3s, box-shadow 0.3s;
            color: white;
        }
        .style-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .style-a { background: linear-gradient(135deg, #667eea, #764ba2); }
        .style-b { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .style-c { background: linear-gradient(135deg, #2193b0, #6dd5ed); }
        .style-card h3 { font-size: 24px; margin-bottom: 12px; }
        .style-card p { font-size: 14px; opacity: 0.9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>黑龙江省水利投资集团官网</h1>
        <h2>新版网站预览 - 三种设计风格</h2>
        <div class="styles">
            <a href="style-a/" class="style-card style-a">
                <h3>🚀 科技未来</h3>
                <p>现代科技感 · QClaw风格<br>渐变配色 · 毛玻璃效果</p>
            </a>
            <a href="style-b/" class="style-card style-b">
                <h3>🏢 企业专业</h3>
                <p>企业专业感 · NVIDIA风格<br>深色主题 · 绿色点缀</p>
            </a>
            <a href="style-c/" class="style-card style-c">
                <h3>💼 极简实验室</h3>
                <p>极简实验室风 · funcoderlab风格<br>纯白背景 · 大字体留白</p>
            </a>
        </div>
    </div>
</body>
</html>
