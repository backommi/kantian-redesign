<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瞰天科技 - 极简实验室风格</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #FFFFFF;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        .minimal-border {
            border: 1px solid #E8E8E8;
        }
    </style>
</head>
<body class="text-black">
    <!-- 导航栏 -->
    <nav class="fixed w-full z-50 bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-8 py-6 flex justify-between items-center">
            <h1 class="text-2xl font-bold">瞰天科技</h1>
            <div class="space-x-12">
                <a href="#" class="text-sm hover:text-gray-600 transition">首页</a>
                <a href="#" class="text-sm hover:text-gray-600 transition">技术服务</a>
                <a href="#" class="text-sm hover:text-gray-600 transition">解决方案</a>
                <a href="#" class="text-sm hover:text-gray-600 transition">关于我们</a>
            </div>
        </div>
    </nav>

    <!-- Hero 区域 -->
    <section class="min-h-screen flex items-center justify-center pt-20 bg-white">
        <div class="text-center max-w-4xl px-8">
            <h2 class="text-7xl font-bold mb-8 tracking-wider">AI 智能体</h2>
            <p class="text-2xl mb-16 text-gray-600 font-light">瞰天科技 · OpenClaw 生态合作伙伴</p>
            <div class="grid grid-cols-3 gap-16">
                <div>
                    <div class="text-6xl font-light mb-4">AI</div>
                    <div class="text-gray-400 text-sm tracking-wider">核心技术</div>
                </div>
                <div>
                    <div class="text-6xl font-light mb-4">OpenClaw</div>
                    <div class="text-gray-400 text-sm tracking-wider">开源生态</div>
                </div>
                <div>
                    <div class="text-6xl font-light mb-4">企业</div>
                    <div class="text-gray-400 text-sm tracking-wider">商业赋能</div>
                </div>
            </div>
        </div>
    </section>

    <!-- 技术服务 -->
    <section class="py-32 px-8 bg-white">
        <div class="max-w-7xl mx-auto">
            <h3 class="text-5xl font-light text-center mb-24 tracking-wider">技术服务</h3>
            <div class="space-y-16">
                <div class="flex justify-between items-center border-b border-gray-200 pb-8">
                    <h4 class="text-3xl font-light">AI 智能体开发</h4>
                    <p class="text-gray-500 text-lg">基于 OpenClaw 框架，打造企业专属 AI 助手</p>
                </div>
                <div class="flex justify-between items-center border-b border-gray-200 pb-8">
                    <h4 class="text-3xl font-light">NemoClaw 安全方案</h4>
                    <p class="text-gray-500 text-lg">企业级 AI 智能体安全与隐私保护</p>
                </div>
                <div class="flex justify-between items-center border-b border-gray-200 pb-8">
                    <h4 class="text-3xl font-light">数字化转型咨询</h4>
                    <p class="text-gray-500 text-lg">一站式数字化转型战略规划与实施</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="py-12 px-8 bg-white border-t border-gray-200">
        <div class="max-w-7xl mx-auto text-center text-gray-400 text-sm">
            <p>© 2026 瞰天科技有限公司 版权所有</p>
        </div>

</html>
