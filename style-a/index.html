<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瞰天科技 - 智能未来</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Microsoft YaHei', sans-serif;
        }
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .gradient-text {
            background: linear-gradient(135deg, #fff, #e0e7ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="text-white">
    <!-- 导航栏 -->
    <nav class="glass fixed w-full z-50 px-8 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold gradient-text">瞰天科技</h1>
            <div class="space-x-8">
                <a href="#" class="hover:text-purple-300 transition">首页</a>
                <a href="#" class="hover:text-purple-300 transition">技术服务</a>
                <a href="#" class="hover:text-purple-300 transition">解决方案</a>
                <a href="#" class="hover:text-purple-300 transition">关于我们</a>
            </div>
        </div>
    </nav>

    <!-- Hero 区域 -->
    <section class="min-h-screen flex items-center justify-center pt-20">
        <div class="text-center max-w-4xl px-8">
            <h2 class="text-6xl font-bold mb-6 gradient-text">智能驱动未来</h2>
            <p class="text-xl mb-12 text-purple-200">瞰天科技 - 专注 AI 与智能体技术研发，赋能企业数字化转型</p>
            <div class="grid grid-cols-3 gap-8">
                <div class="glass p-6 rounded-xl">
                    <div class="text-4xl font-bold text-purple-300">AI 智能体</div>
                    <div class="text-purple-200 mt-2">核心业务</div>
                </div>
                <div class="glass p-6 rounded-xl">
                    <div class="text-4xl font-bold text-pink-300">OpenClaw</div>
                    <div class="text-purple-200 mt-2">技术生态</div>
                </div>
                <div class="glass p-6 rounded-xl">
                    <div class="text-4xl font-bold text-indigo-300">企业赋能</div>
                    <div class="text-purple-200 mt-2">解决方案</div>
                </div>
            </div>
        </div>
    </section>

    <!-- 技术服务 -->
    <section class="py-20 px-8">
        <div class="max-w-7xl mx-auto">
            <h3 class="text-4xl font-bold text-center mb-16 gradient-text">技术服务</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <div class="glass p-8 rounded-xl hover:scale-105 transition">
                    <h4 class="text-2xl font-bold mb-4 text-purple-300">AI 智能体开发</h4>
                    <p class="text-purple-200">基于 OpenClaw 框架，打造企业专属 AI 助手</p>
                </div>
                <div class="glass p-8 rounded-xl hover:scale-105 transition">
                    <h4 class="text-2xl font-bold mb-4 text-pink-300">智能体安全</h4>
                    <p class="text-purple-200">NemoClaw 企业级安全方案，保障数据安全</p>
                </div>
                <div class="glass p-8 rounded-xl hover:scale-105 transition">
                    <h4 class="text-2xl font-bold mb-4 text-indigo-300">数字化转型</h4>
                    <p class="text-purple-200">一站式数字化转型咨询与实施服务</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="glass py-8 px-8 mt-20">
        <div class="max-w-7xl mx-auto text-center text-purple-200">
            <p>© 2026 瞰天科技有限公司 版权所有</p>
        </div>
    </footer>
</body>
</html>
